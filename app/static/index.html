<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Queeree — AI Search</title>
    <meta name="description" content="Queeree — cute AI-powered search" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=Outfit:wght@300;400;500;600;700;800&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="/static/style.css" />
  </head>
  <body>

    <!-- Moderation Search Section -->
    <div class="search-wrapper" id="searchWrapper">
      <div class="logo" id="logo">
        <h1>Queeree<span class="dot"></span></h1>
        <p class="subtitle">content moderation & fact-checking ✨</p>
      </div>

      <div class="search-container">
        <div class="input-panel">
          <textarea
            id="searchInput"
            placeholder="Paste content here to analyze for moderation guidelines..."
            autocomplete="off"
            rows="4"
          ></textarea>
          <!-- Image preview container -->
          <div id="imagePreview" class="image-preview" style="display: none;"></div>

          <!-- Media URL input row (hidden by default) -->
          <div id="mediaUrlRow" class="media-url-row" style="display: none;">
            <svg class="media-url-icon" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            <input type="url" id="mediaUrlInput" placeholder="Paste image or media URL here..." autocomplete="off">
            <button class="media-url-clear" id="mediaUrlClear" title="Clear URL">&times;</button>
          </div>
          
          <div class="input-actions">
            <!-- Settings Toggle Button -->
            <button class="icon-btn tooltip" id="settingsToggleBtn" data-tooltip="Settings">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><circle cx="12" cy="12" r="3"></circle><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"></path></svg>
            </button>
            <!-- Link / URL Toggle Button -->
            <button class="icon-btn tooltip" id="urlToggleBtn" data-tooltip="Attach URL">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"></path><path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"></path></svg>
            </button>
            <input type="file" id="imageInput" accept="image/*" style="display: none;">
            <button class="icon-btn tooltip" id="uploadBtn" data-tooltip="Upload Image">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="17 8 12 3 7 8"></polyline><line x1="12" y1="3" x2="12" y2="15"></line></svg>
            </button>
            <button class="search-btn" id="searchBtn">
              <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
                <line x1="5" y1="12" x2="19" y2="12"></line>
                <polyline points="12 5 19 12 12 19"></polyline>
              </svg>
              Analyze
            </button>
          </div>
        </div>

        <!-- Configuration Settings Panel (Hidden by default) -->
        <div id="settingsPanel" class="settings-panel" style="display: none;">
          <div class="settings-group">
            <label for="cfgClassifierModel">Classifier Model</label>
            <input type="text" id="cfgClassifierModel" placeholder="e.g. qwen/qwen3.5-35b-a3b">
          </div>
          <div class="settings-group">
            <label for="cfgFactCheckerModel">Fact Checker Model</label>
            <input type="text" id="cfgFactCheckerModel" placeholder="e.g. qwen/qwen3.5-35b-a3b">
          </div>
          <div class="settings-row">
            <div class="settings-group">
              <label for="cfgLawRetrieverModel">Law Retriever Model (LLM)</label>
              <input type="text" id="cfgLawRetrieverModel" placeholder="e.g. qwen/qwen3.5-35b-a3b">
            </div>
          </div>
          <div class="settings-row">
            <div class="settings-group">
              <label for="cfgFactLoops">Max FC Loops</label>
              <input type="number" id="cfgFactLoops" placeholder="3" min="1" max="10">
            </div>
            <div class="settings-group">
              <label for="cfgClassifierSamples">Classifier Samples</label>
              <input type="number" id="cfgClassifierSamples" placeholder="3" min="1" max="5">
            </div>
            <div class="settings-group">
              <label for="cfgFactSamples">FC Samples</label>
              <input type="number" id="cfgFactSamples" placeholder="3" min="1" max="5">
            </div>
          </div>
        </div>

        <div class="loading-bar-track" id="loadingBar">
          <div class="loading-bar-fill"></div>
        </div>
      </div>
    </div>

    <!-- Result Section -->
    <div class="result-area" id="resultArea" style="display: none;">
      <!-- Progress Stepper -->
      <div class="progress-stepper" id="progressStepper">
         <div class="step-text" id="statusMessage">Menunggu...</div>
      </div>
      
      <!-- Dynamic results will be injected here -->
      <div id="resultContent"></div>
    </div>

    <div class="footer" id="footer" style="display: none;">
      powered by <a href="https://openrouter.ai" target="_blank">OpenRouter</a> &amp; Sanic
    </div>

    <script src="/static/app.js"></script>
  </body>
</html>
